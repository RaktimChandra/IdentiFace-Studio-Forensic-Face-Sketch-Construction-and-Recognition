version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: identiface-postgres
    environment:
      POSTGRES_DB: identiface_db
      POSTGRES_USER: identiface
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - identiface-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identiface"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: identiface-redis
    ports:
      - "6379:6379"
    networks:
      - identiface-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: identiface-backend
    environment:
      DATABASE_URL: postgresql://identiface:password123@postgres/identiface_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      ENVIRONMENT: production
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - identiface-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: identiface-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - identiface-network
    environment:
      VITE_API_URL: http://localhost:8000

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: identiface-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - identiface-network

volumes:
  postgres_data:
    driver: local

networks:
  identiface-network:
    driver: bridge
